name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ensure debug keystore exists
        run: |
          if [ ! -f "keystore/debug.keystore" ]; then
            mkdir -p keystore
            keytool -genkeypair -v \
              -keystore keystore/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add keystore/debug.keystore
            git commit -m "ci: add fixed debug keystore for stable signing"
            git push
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WgWidget-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish to latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Auto build from commit ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
          prerelease: false
